name: Release
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Update Cargo dependencies
        run: cargo update
        working-directory: src-tauri

      - name: Build Tauri app
        id: build_tauri
        shell: pwsh
        run: |
          npx tauri build --target x86_64-pc-windows-msvc
          # 记录构建产物的版本号
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "APP_VERSION=v$version" >> $env:GITHUB_OUTPUT
          echo "APP_VERSION=$version"

      - name: Generate Updater JSON
        shell: pwsh
        run: |
          $version = "${{ steps.build_tauri.outputs.APP_VERSION }}"
          $installerName = "YuanJiAIManJu_${version}_x64-setup.exe"
          $sigFile = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/YuanJiAIManJu_${version}_x64-setup.exe.sig"
          $signature = Get-Content $sigFile -Raw
          $url = "https://github.com/${{ github.repository }}/releases/download/v$version/$installerName"
          $json = @{
            version = $version
            pub_date = (Get-Date -Format "o")
            platforms = @{
              "windows-x86_64" = @{
                url = $url
                signature = $signature.Trim()
              }
            }
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content "latest.json"
          Get-Content "latest.json"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 源极AI漫剧 v${{ github.ref_name }}
          body: |
            ## 更新内容

            请下载安装包进行安装。

            **Windows**: 下载 `.exe` 安装包。

            ---
            自动更新已启用，已安装旧版本的用户将在启动时收到更新提示。
          draft: false
          prerelease: false
          files: |
            latest.json
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/YuanJiAIManJu_*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/YuanJiAIManJu_*.exe.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
